<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora ENCA24</title>

<style>

/* ===== ESTILO GENERAL ===== */

body{
background:#1b1b1b;
font-family:Arial;
color:white;
margin:0;
padding:20px;
display:flex;
justify-content:center;
}

/* ===== CONTENEDOR PRINCIPAL ===== */

.contenedor{
display:grid;
grid-template-columns:250px 320px 250px;
gap:20px;
align-items:start;
}

/* ===== HISTORIAL ===== */

.historial{
background:black;
padding:15px;
border-radius:10px;
height:420px;
overflow-y:auto;
}

.historial h2{
text-align:center;
margin-bottom:10px;
}

/* ===== CALCULADORA ===== */

.calculadora{
background:black;
padding:20px;
border-radius:15px;
}

.pantalla{
background:#111;
font-size:28px;
padding:12px;
border-radius:10px;
text-align:right;
margin-bottom:15px;
overflow-x:auto;
}

/* ===== BOTONES ===== */

.botones{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
padding:18px;
font-size:18px;
border:none;
border-radius:50%;
background:#333;
color:white;
cursor:pointer;
}

button:hover{
background:#555;
}

.operador{
background:orange;
color:black;
font-weight:bold;
}

/* ===== CREDITOS ===== */

.creditos{
background:black;
padding:20px;
border-radius:10px;
text-align:center;
height:420px;
}

.creditos h2{
color:red;
margin-bottom:20px;
}

.creditos p{
line-height:1.8;
}

/* ===== RESPONSIVE PARA CELULAR ===== */

@media (max-width:900px){

.contenedor{
grid-template-columns:1fr;
}

.historial,
.calculadora,
.creditos{
width:100%;
}

}

</style>

</head>


<body>

<div class="contenedor">


<!-- HISTORIAL -->

<div class="historial">

<h2>Historial</h2>

<div id="historial"></div>

</div>


<!-- CALCULADORA -->

<div class="calculadora">

<div class="pantalla" id="pantalla">0</div>

<div class="botones">

<button onclick="agregar('7')">7</button>
<button onclick="agregar('8')">8</button>
<button onclick="agregar('9')">9</button>
<button class="operador" onclick="agregar('/')">÷</button>

<button onclick="agregar('4')">4</button>
<button onclick="agregar('5')">5</button>
<button onclick="agregar('6')">6</button>
<button class="operador" onclick="agregar('*')">×</button>

<button onclick="agregar('1')">1</button>
<button onclick="agregar('2')">2</button>
<button onclick="agregar('3')">3</button>
<button class="operador" onclick="agregar('-')">-</button>

<button onclick="agregar('0')">0</button>
<button onclick="agregar('.')">.</button>
<button onclick="calcular()">=</button>
<button class="operador" onclick="agregar('+')">+</button>

<button onclick="limpiar()">C</button>

</div>

</div>


<!-- CREDITOS -->

<div class="creditos">

<h2>PATROCINADO POR ENCA24</h2>

<p>

Esta calculadora fue desarrollada con el apoyo del

<br><br>

<b>Profesor Jorge Mario</b>

<br><br>

Colaboradores

<br><br>

Francisco Javier
<br>
Juan Sebastián

<br><br>

<b>Dios Roca</b>

</p>

</div>


</div>


<script>

/* ===== VARIABLES ===== */

let pantalla = document.getElementById("pantalla")
let historial = document.getElementById("historial")

let operacion = ""

/* ===== AGREGAR NUMERO U OPERADOR ===== */

function agregar(valor){

operacion += valor
pantalla.innerText = operacion

}


/* ===== CALCULAR RESULTADO ===== */

function calcular(){

try{

let resultado = eval(operacion)

historial.innerHTML += operacion + " = " + resultado + "<br>"

pantalla.innerText = resultado

operacion = resultado

}

catch{

pantalla.innerText = "Error"

}

}


/* ===== LIMPIAR CALCULADORA ===== */

function limpiar(){

operacion = ""
pantalla.innerText = "0"

}

</script>

</body>

</html>
